<!DOCTYPE html>
<html>

<head>

    <title>Edit Student</title>

    <link rel="stylesheet"
          href="{{ url_for('static',
          filename='main.css') }}">

</head>

<body>

<div class="container">

    <h1>Edit Student</h1>

    <form method="POST"
          action="/update_student/{{ student.id }}">

        <label>Student ID</label>

        <input type="text"
               name="student_id"
               value="{{ student.student_id }}"
               required>

        <br><br>

        <label>Student Name</label>

        <input type="text"
               name="student_name"
               value="{{ student.student_name }}"
               required>

        <br><br>

        <label>Gender</label>

        <select name="gender">

            <option {% if student.gender=='Male' %}selected{% endif %}>
                Male
            </option>

            <option {% if student.gender=='Female' %}selected{% endif %}>
                Female
            </option>

        </select>

        <br><br>

        <label>Course</label>

        <input type="text"
               name="course"
               value="{{ student.course }}">

        <br><br>

        <label>Department</label>

        <input type="text"
               name="department"
               value="{{ student.department }}">

        <br><br>

        <label>Mobile</label>

        <input type="text"
               name="mobile"
               value="{{ student.mobile }}">

        <br><br>

        <label>Email</label>

        <input type="email"
               name="email"
               value="{{ student.email }}">

        <br><br>

        <label>Address</label>

        <textarea
        name="address">{{ student.address }}</textarea>

        <br><br>

        <button type="submit">
            Update Student
        </button>

        <a href="/student_list">
            Cancel
        </a>

    </form>

</div>

</body>

</html>
