{% extends 'base.html' %}
{% block content %}
<h1>Add Student</h1>

<form action="/save_student"
method="POST">

Student ID

<input type="text"
name="student_id">

<br><br>

Student Name

<input type="text"
name="student_name">

<br><br>

Gender

<select name="gender">

<option>Male</option>

<option>Female</option>

</select>

<br><br>

Course

<input type="text"
name="course">

<br><br>

Department

<input type="text"
name="department">

<br><br>

Mobile

<input type="text"
name="mobile">

<br><br>

Email

<input type="text"
name="email">

<br><br>

Address

<textarea
name="address"></textarea>

<br><br>

<button>
Save Student
</button>

</form>
{% endblock %}
